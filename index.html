<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gloria & Luis | 12 Septiembre 2026</title>

<link href="https://fontst+Garamond:wght@300;400;500;600&family=Parisienne&display=swap" rel="stylesheet">

<style>

:root{
--marfil:#f8f5ef;
--dorado:#b89b72;
--texto:#4e443b;
--detalle:#80625d;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cormorant Garamond',serif;
background:var(--marfil);
color:var(--texto);
overflow-x:hidden;
}

.hero{
height:100vh;
position:relative;
overflow:hidden;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
animation:zoomHero 25s ease-in-out infinite alternate;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.30);
}

.hero-content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
z-index:2;
width:90%;
}

.hero-content h1{
font-family:'Parisienne',cursive;
font-size:6rem;
font-weight:400;
}

.hero-content p{
letter-spacing:4px;
text-transform:uppercase;
}

section{
padding:90px 25px;
}

.container{
max-width:1100px;
margin:auto;
}

.intro{
text-align:center;
}

.intro p{
max-width:900px;
margin:auto;
font-size:1.8rem;
line-height:1.7;
}

h2{
text-align:center;
font-size:3rem;
margin-bottom:50px;
}

.countdown{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
}

.timebox{
background:white;
padding:25px;
border-radius:12px;
min-width:130px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
text-align:center;
}

.timebox span{
display:block;
font-size:3rem;
color:var(--dorado);
}

.gallery{
max-width:900px;
margin:auto;
}

.gallery img{
width:100%;
border-radius:12px;
box-shadow:0 15px 40px rgba(0,0,0,.15);
}

.event{
display:grid;
grid-template-columns:1fr 1fr;
gap:60px;
align-items:center;
margin-bottom:80px;
}

.event img{
width:100%;
border-radius:10px;
box-shadow:0 15px 30px rgba(0,0,0,.12);
}

.event h3{
font-size:2.5rem;
margin-bottom:15px;
}

.event p{
font-size:1.4rem;
}

.buttons{
text-align:center;
}

.btn{
display:inline-block;
margin:10px;
padding:15px 30px;
border-radius:40px;
text-decoration:none;
color:white;
font-size:1.2rem;
transition:.3s;
}

.btn:hover{
transform:translateY(-3px);
}

.gold{
background:var(--dorado);
}

.green{
background:#25D366;
}

.music-btn{
background:var(--detalle);
border:none;
cursor:pointer;
}

.closing{
background:white;
text-align:center;
}

.closing p{
font-size:2rem;
max-width:800px;
margin:auto;
}

.signature{
margin-top:20px;
font-family:'Parisienne',cursive;
font-size:4rem;
color:var(--detalle);
}

footer{
padding:40px;
text-align:center;
color:#777;
}

.fade{
opacity:0;
transform:translateY(30px);
transition:1s;
}

.fade.visible{
opacity:1;
transform:none;
}

@keyframes zoomHero{
from{transform:scale(1);}
to{transform:scale(1.08);}
}

@media(max-width:768px){
